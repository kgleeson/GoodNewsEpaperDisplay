[EPD]
mode=color
# Calibrated to actual ink appearance on this display (measured from test pattern):
# black=navy, white, green=forest, blue=slate, red=brick, yellow=olive, orange=rust
palette_filter = [30,20,60],[255,255,255],[50,140,60],[60,90,160],[180,60,60],[170,170,60],[160,80,40]

[Display]
dither=Atkinson
dither_strength=0.8
dither_serpentine=True
